<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">CLI control plane</title>
  <desc id="desc">SelfHarness code CLI separates slash-command controls from model chat, with provider, model, effort, thread, config, and interrupt controls.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#273f3a"/>
    </marker>
    <style>
      .bg{fill:#fbfaf7}
      .panel{fill:#ffffff;stroke:#d6d0c5;stroke-width:2}
      .control{fill:#eef7f4;stroke:#7fa49a;stroke-width:2}
      .model{fill:#fff4df;stroke:#b9954c;stroke-width:2}
      .title{font:700 34px Arial,sans-serif;fill:#17231f}
      .label{font:700 18px Arial,sans-serif;fill:#17231f}
      .body{font:400 15px Arial,sans-serif;fill:#47534f}
      .mono{font:400 14px Menlo,Consolas,monospace;fill:#2d3835}
      .arrow{fill:none;stroke:#273f3a;stroke-width:3;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1200" height="560"/>
  <text class="title" x="62" y="68">SelfHarness Code CLI</text>
  <text class="body" x="64" y="98">Slash commands stay local. Plain text goes to the active headless coding backend.</text>

  <rect class="panel" x="70" y="160" width="260" height="250" rx="8"/>
  <text class="label" x="104" y="202">User Prompt</text>
  <text class="mono" x="104" y="244">/menu</text>
  <text class="mono" x="104" y="276">/model codex gpt-5.6 xhigh</text>
  <text class="mono" x="104" y="308">/threads</text>
  <text class="mono" x="104" y="340">fix the failing build</text>

  <rect class="control" x="450" y="118" width="300" height="170" rx="8"/>
  <text class="label" x="486" y="158">Control Plane</text>
  <text class="body" x="486" y="192">provider/model/effort picker</text>
  <text class="body" x="486" y="218">thread switcher</text>
  <text class="body" x="486" y="244">config, status, save, exit</text>

  <rect class="model" x="450" y="338" width="300" height="126" rx="8"/>
  <text class="label" x="486" y="378">Chat Plane</text>
  <text class="body" x="486" y="412">streams prompts and responses</text>
  <text class="body" x="486" y="438">to the active backend</text>

  <rect class="panel" x="870" y="118" width="260" height="346" rx="8"/>
  <text class="label" x="904" y="158">Backends</text>
  <text class="mono" x="904" y="196">codex exec</text>
  <text class="mono" x="904" y="228">agy --print</text>
  <text class="mono" x="904" y="260">claude --print</text>
  <text class="mono" x="904" y="292">glm 5.2</text>
  <text class="body" x="904" y="338">Ctrl-C interrupts an active turn.</text>
  <text class="body" x="904" y="364">/exit saves and leaves cleanly.</text>

  <path class="arrow" d="M330 248 H442"/>
  <path class="arrow" d="M330 360 H442"/>
  <path class="arrow" d="M750 204 H862"/>
  <path class="arrow" d="M750 400 H862"/>
</svg>
